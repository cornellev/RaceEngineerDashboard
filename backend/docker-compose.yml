# docker-compose.yml

services:
  postgres:
    image: postgres:alpine
    environment:
      POSTGRES_DB: telemetry_db
      POSTGRES_PASSWORD: password
      POSTGRES_USER: postgres
    ports:
      - 5435:5432
    restart: on-failure:3
    networks:
      - redis-network

  pgweb:
    image: sosedoff/pgweb
    depends_on:
      - postgres
    environment:
      PGWEB_DATABASE_URL: postgres://postgres:password@postgres:5432/telemetry_db?sslmode=disable
    ports:
      - 8085:8081
    restart: on-failure:3
    networks:
      - redis-network

  redis:
    image: redis:latest
    command: redis-server
    volumes:
      - redis:/var/lib/redis
      - redis-config:/usr/local/etc/redis/redis.conf
    ports:
      - 6379:6379
    networks:
      - redis-network

  api:
    build:
      context: api
      dockerfile: Dockerfile
    ports:
      - 8000:8000
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=telemetry_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
    depends_on:
      - postgres
      - redis
    restart: on-failure:3
    networks:
      - redis-network

  subscriber:
    build:
      context: subscriber
      dockerfile: Dockerfile
    environment:
      - POSTGRES_HOST=localhost  # Use localhost with host network mode
      - POSTGRES_PORT=5435  # Use host-exposed port (5435:5432)
      - POSTGRES_DB=telemetry_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - REDIS_HOST=localhost  # Use localhost with host network mode
      - REDIS_PORT=6379
      - REDIS_DB=0
      - ROS_DOMAIN_ID=14  # ROS 2 domain ID (set to 14)
    depends_on:
      - postgres
      - redis
    restart: on-failure:3
    # Host network mode for ROS discovery over Tailscale/VPN
    # Note: With host network, can't use Docker service names - must use localhost
    network_mode: "host"

  redis-commander:
    image: rediscommander/redis-commander:latest
    environment:
      - REDIS_HOSTS=local:redis:6379
      - HTTP_USER=root
      - HTTP_PASSWORD=password
    ports:
      - 8081:8081
    networks:
      - redis-network
    depends_on:
      - redis

volumes:
  redis:
  redis-config:

networks:
  redis-network:
    driver: bridge
